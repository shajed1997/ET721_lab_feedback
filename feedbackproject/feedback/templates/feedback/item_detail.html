<!DOCTYPE html>
<html>
<body>
    <h1>{{ item.name }}</h1>
    <h2>Feedbacks</h2>
    <ul>
        {% for feedback in feedbacks %}
            <li>{{ feedback.comment }} - {{ feedback.rating }}/5</li>
        {% empty %}
            <li>No feedback yet.</li>
        {% endfor %}
    </ul>
    <h2>Add Feedback</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit</button>
    </form>
</body>
</html>
